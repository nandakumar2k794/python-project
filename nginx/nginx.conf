events {}
http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    client_max_body_size 10M;
    
    location /healthz { return 200 "ok"; }
    
    # AI service API - allow 150s for Ollama image analysis
    location /ai/ { 
      set $flask_ai_upstream http://flask_ai:5001;
      proxy_pass $flask_ai_upstream; 
      proxy_set_header Host $host;
      proxy_connect_timeout 150s;
      proxy_send_timeout 150s;
      proxy_read_timeout 150s;
    }
    
    # WebSocket support for real-time notifications
    location /ws/ { 
      set $django_upstream http://django:8000;
      proxy_pass $django_upstream; 
      proxy_http_version 1.1; 
      proxy_set_header Upgrade $http_upgrade; 
      proxy_set_header Connection "upgrade"; 
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
    
    # Django application (including static files)
    location / { 
      set $django_upstream http://django:8000;
      proxy_pass $django_upstream; 
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }
}
