{% extends "base.html" %}
{% block content %}
<section class="min-h-screen flex items-center justify-center px-4">
  <article class="glass-card p-8 rounded-2xl space-y-6 w-full max-w-md">
    <div>
      <h1 class="font-heading text-3xl font-bold mb-2">Create Account</h1>
      <p class="text-slate-400">Join our community and start reporting civic issues</p>
    </div>
    
    <form id="register-form" class="space-y-4">
      <div>
        <label class="label">Full Name</label>
        <input 
          class="input text-base" 
          name="name" 
          type="text"
          required 
          placeholder="John Doe"
          minlength="2"
          maxlength="100"
        >
      </div>
      
      <div>
        <label class="label">Email Address</label>
        <input 
          class="input text-base" 
          name="email" 
          type="email" 
          required 
          placeholder="your@email.com"
          autocomplete="email"
        >
      </div>
      
      <div>
        <label class="label">Password</label>
        <input 
          class="input text-base" 
          name="password" 
          type="password" 
          required 
          placeholder="Create a password"
          minlength="8"
          title="Password must be at least 8 characters"
          autocomplete="new-password"
        >
        <p class="text-xs text-slate-500 mt-2">Minimum 8 characters for security</p>
      </div>
      
      <div>
        <label class="label">Confirm Password</label>
        <input 
          class="input text-base" 
          name="password_confirm" 
          type="password" 
          required 
          placeholder="Confirm your password"
          minlength="8"
          title="Password confirmation must match"
          autocomplete="new-password"
        >
      </div>
      
      <div class="bg-blue-500/10 border border-blue-500/30 rounded-lg p-3">
        <p class="text-xs text-blue-300">
          Accounts are ready to use after registration.
        </p>
      </div>
      
      <button class="btn-primary w-full py-3 text-lg font-semibold" type="submit">
        Create Account
      </button>
    </form>
    
    <div class="border-t border-slate-800"></div>
    
    <div class="text-center">
      <p class="text-slate-400 text-sm">Already have an account?</p>
      <a href="/login/" class="text-emerald-400 hover:text-emerald-300 font-semibold transition-colors inline-block mt-2">
        Sign in ->
      </a>
    </div>
  </article>
</section>

<script>
  window.CIVIC_PAGE='register';
</script>
{% endblock %}
