services:
  django:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ./django_app:/app
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      flask_ai:
        condition: service_healthy
    networks:
      - civic-net
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1',8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    command: celery -A config worker -B -l info --without-gossip --without-mingle --without-heartbeat
    volumes:
      - ./django_app:/app
    env_file:
      - .env
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - civic-net
    restart: always
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - civic-net
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - civic-net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - civic-net
    restart: always
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      django:
        condition: service_healthy
    networks:
      - civic-net
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  flask_ai:
    build:
      context: ./flask_ai_service
      dockerfile: Dockerfile
    command: gunicorn -b 0.0.0.0:5001 --timeout 180 --workers 1 app:app
    volumes:
      - ./flask_ai_service:/app
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - civic-net
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1',5001)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  civic-net:

volumes:
  mongo_data:
  ollama_data:
